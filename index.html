      .bf {

      .bf-scrollbar::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 8px; }

      .bf-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom: 32px; }
      .bf-logo { display:flex; align-items:center; gap:10px; }
      .bf-logo-mark { width:38px; height:38px; border-radius:9px; background:linear-gradient(135deg,var(--gold),#c8892b); display:flex; align-items:center; justify-content:center; box-shadow:0 0 24px rgba(244,185,66,0.35); flex-shrink:0; }

      .bf-btn { font-family:'Inter',sans-serif; font-weight:600; font-size:14px; border-radius:10px; padding:11px 18px; border:1px solid var(--line2); background:var(--surface); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition: all .15s ease; }

      .bf-btn:active { transform: translateY(0); }

      .bf-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

      .bf-auth-card { width:100%; max-width:400px; }
      .bf-auth-tabs { display:flex; gap:8px; margin-bottom:22px; }

      .bf-stats-table th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color: var(--muted); font-weight:700; padding:12px 16px; background: var(--surface2); border-bottom:1px solid var(--line); }
      .bf-stats-table td { padding:12px 16px; font-size:14px; border-bottom:1px solid var(--line); }
      .bf-stats-table tr:last-child td { border-bottom:none; }
      .bf-stats-table th.num, .bf-stats-table td.num { text-align:center; font-family:'JetBrains Mono',monospace; }
      .bf-stats-rank { display:flex; align-items:center; gap:8px; font-weight:600; }
      .bf-stats-rank-num { width:20px; color: var(--muted2); font-family:'JetBrains Mono',monospace; font-size:12px; }

      .bf-ref-launch { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:3px 7px; border-radius:6px; border:1px solid var(--line2); background: var(--bg2); color: var(--muted2); cursor:pointer; flex-shrink:0; transition: all .12s; margin-left:auto; }
      .bf-ref-launch:hover { border-color: var(--teal); color: var(--teal); }

      .bf-ref-root { position:fixed; inset:0; z-index:100; background: radial-gradient(circle at 50% -20%, #101927 0, #080d14 42%, #04070b 100%); color:#f4f6fa; font-family:'Inter',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }
      .bf-ref-app { width:1180px; max-width:96vw; padding:14px; display:flex; flex-direction:column; gap:14px; will-change:transform; }
      .bf-ref-topbar { display:flex; align-items:center; justify-content:space-between; }
      .bf-ref-exit { height:44px; padding:0 18px; border:1px solid #303846; border-radius:11px; background:linear-gradient(180deg,#111821,#0b1017); color:#d9dde6; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
      .bf-ref-board { display:grid; grid-template-columns: minmax(280px,.95fr) minmax(420px,1.35fr) minmax(280px,.95fr); gap:20px; flex:1; }
      .bf-ref-panel { background: linear-gradient(150deg, rgba(12,18,27,.985), rgba(6,10,16,.99)); border:1px solid #252d39; border-radius:18px; box-shadow:0 24px 80px rgba(0,0,0,.42); position:relative; overflow:hidden; }
      .bf-ref-competitor { padding: 28px 26px 24px; display:flex; flex-direction:column; }
      .bf-ref-competitor::before { content:""; position:absolute; left:0; right:0; top:0; height:9px; background: var(--ref-accent); box-shadow: 0 0 24px var(--ref-accent); opacity:0.55; }
      .bf-ref-corner { font: 700 17px 'Barlow Condensed',sans-serif; letter-spacing:.075em; color: var(--ref-accent); text-transform:uppercase; }
      .bf-ref-name { font: 800 clamp(30px,4vw,48px) 'Barlow Condensed',sans-serif; line-height:.96; text-transform:uppercase; margin-top:16px; }
      .bf-ref-academy { font-size:15px; color:#a6acb8; margin-top:8px; min-height:18px; }
      .bf-ref-divider { height:1px; background:#252d39; margin:20px 0 22px; }
      .bf-ref-score-area { display:grid; grid-template-columns: 64px 1fr 64px; gap:14px; align-items:center; }
      .bf-ref-score-buttons { display:grid; gap:10px; }
      .bf-ref-square { height:58px; border:1px solid #303846; border-radius:11px; background:linear-gradient(180deg,#121923,#0c1119); color:#fff; font-size:28px; font-weight:800; cursor:pointer; }
      .bf-ref-square:hover, .bf-ref-quick:hover, .bf-ref-timebtn:hover { filter:brightness(1.14); }
      .bf-ref-score { font: 800 clamp(64px,9vw,110px) 'JetBrains Mono',monospace; text-align:center; letter-spacing:-.08em; line-height:.88; color: var(--ref-accent); }
      .bf-ref-section-title { display:flex; align-items:center; gap:12px; color:#858c9a; font:700 13px 'Barlow Condensed',sans-serif; letter-spacing:.09em; text-transform:uppercase; margin:18px 0 11px; }
      .bf-ref-section-title::before, .bf-ref-section-title::after { content:""; height:1px; flex:1; background:#252d39; }
      .bf-ref-quick-grid { display:grid; grid-template-columns: repeat(3,1fr); gap:9px; }
      .bf-ref-quick { height:52px; border:1px solid #2a3340; border-radius:10px; background:linear-gradient(180deg,#111821,#0b1017); color:#f3f5f8; font-size:18px; font-weight:800; cursor:pointer; }
      .bf-ref-center { padding: 26px 26px 22px; display:flex; flex-direction:column; }
      .bf-ref-meta { display:flex; justify-content:space-between; gap:14px; color:#a7adba; font:700 15px 'Barlow Condensed',sans-serif; letter-spacing:.06em; text-transform:uppercase; }
      .bf-ref-timer { font: 800 clamp(70px,11vw,130px) 'JetBrains Mono',monospace; text-align:center; line-height:.94; letter-spacing:-.09em; margin:22px 0 26px; color:#fff; }
      .bf-ref-timer.warning { color: var(--ref-amber); }
      .bf-ref-timer.critical { color:#ff4848; animation: bf-ref-pulse .65s infinite alternate; }
      @keyframes bf-ref-pulse { to { text-shadow: 0 0 32px rgba(255,72,72,.6); } }
      .bf-ref-main-controls { display:grid; grid-template-columns: 1fr 92px; gap:14px; }
      .bf-ref-start { height:68px; border:1px solid rgba(255,255,255,.08); border-radius:12px; background:linear-gradient(135deg,#25b943,#15932f); color:white; font-size:21px; font-weight:800; text-transform:uppercase; cursor:pointer; }
      .bf-ref-start.paused { background:linear-gradient(135deg,#daa22f,#b8791d); }
      .bf-ref-mute { height:68px; border:1px solid #303846; border-radius:12px; background:linear-gradient(180deg,#111821,#0b1017); color:#d6dbe5; font-size:12px; font-weight:700; cursor:pointer; display:grid; place-items:center; gap:4px; text-transform:uppercase; }
      .bf-ref-mute .bf-ref-icon { font-size:22px; }
      .bf-ref-mute.active { color:#ffb4b4; border-color:#743535; }
      .bf-ref-time-controls { display:grid; grid-template-columns: repeat(4,1fr); gap:9px; }
      .bf-ref-timebtn { height:52px; border:1px solid #303846; border-radius:10px; background:linear-gradient(180deg,#111821,#0b1017); color:white; font-size:16px; font-weight:800; cursor:pointer; }
      .bf-ref-timebtn.danger { color:#ff4949; }
      .bf-ref-submission-wrap { margin-top:auto; padding-top:20px; border-top:1px solid #252d39; }
      .bf-ref-submission-grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
      .bf-ref-submit { min-height:74px; border-radius:11px; border:1px solid rgba(255,255,255,.14); color:#fff; font:800 19px 'Barlow Condensed',sans-serif; text-transform:uppercase; cursor:pointer; }
      .bf-ref-submit.blue { background:linear-gradient(135deg,#1375f4,#0755c3); }
      .bf-ref-submit.red { background:linear-gradient(135deg,#ef3937,#c02024); }
      .bf-ref-hint { text-align:center; color:#9ba2af; font-size:12.5px; line-height:1.5; margin:12px 0 0; }
      .bf-ref-endbtn { margin-top:12px; height:48px; border-radius:10px; border:1px solid #303846; background:linear-gradient(180deg,#111821,#0b1017); color:#d9dde6; font-weight:700; cursor:pointer; width:100%; }
      .bf-ref-footer { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 22px; background: linear-gradient(150deg, rgba(12,18,27,.985), rgba(6,10,16,.99)); border:1px solid #252d39; border-radius:18px; flex-wrap:wrap; }
      .bf-ref-lock { display:flex; align-items:center; gap:14px; }
      .bf-ref-lock-text strong { display:block; font:700 16px 'Barlow Condensed',sans-serif; letter-spacing:.05em; text-transform:uppercase; }
      .bf-ref-lock-text span { display:block; color:#979eac; font-size:12px; margin-top:2px; }
      .bf-ref-toggle { width:56px; height:32px; border:1px solid #252d39; border-radius:999px; background:#161d28; padding:3px; cursor:pointer; flex-shrink:0; }
      .bf-ref-toggle-knob { width:24px; height:24px; border-radius:50%; background:#cbd2df; transition:.2s; }
      .bf-ref-toggle.on { background:#1b6f37; }
      .bf-ref-toggle.on .bf-ref-toggle-knob { transform:translateX(24px); background:white; }
      .bf-ref-locked .bf-ref-board button:not(.bf-ref-allowed) { pointer-events:none; opacity:0.5; }

      .bf-ref-overlay { position:fixed; inset:0; background:rgba(2,5,9,.86); backdrop-filter:blur(11px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:110; }
      .bf-ref-modal { width:min(480px,100%); padding:32px; text-align:center; background:linear-gradient(150deg,#111a27,#090e16); border:1px solid #344054; border-radius:20px; }
      .bf-ref-winner-label { font:700 14px 'Barlow Condensed',sans-serif; text-transform:uppercase; letter-spacing:.12em; color:#9aa3b4; }
      .bf-ref-winner-name { font:800 40px 'Barlow Condensed',sans-serif; text-transform:uppercase; margin:10px 0; }
      .bf-ref-winner-method { font-size:15px; color:#cfd4df; margin-bottom:22px; }
      .bf-ref-modal-actions { display:grid; gap:10px; }
      .bf-ref-modal-actions.two { grid-template-columns: 1fr 1fr; }
      .bf-ref-modal button { height:50px; border-radius:11px; font-weight:800; cursor:pointer; }
      .bf-ref-confirm-btn { border:0; background:linear-gradient(135deg,#24b645,#178f32); color:white; }
      .bf-ref-cancel-btn { border:1px solid #252d39; background:#121a26; color:white; }
      .bf-ref-decision-btn { border:1.5px solid var(--decision-accent); background: rgba(255,255,255,0.03); color:white; text-align:left; padding:0 18px; }
      .bf-ref-decision-btn .name { font:700 18px 'Barlow Condensed',sans-serif; text-transform:uppercase; }
      .bf-ref-decision-btn .score { font-family:'JetBrains Mono',monospace; float:right; }

      @media (max-width: 1180px) {
        .bf-ref-board { grid-template-columns: 1fr 1fr; }
        .bf-ref-center { grid-column: 1 / -1; grid-row: 1; }
      }
      @media (max-width: 760px) {
        .bf-ref-app { padding:9px; gap:9px; }
        .bf-ref-board { display:flex; flex-direction:column; gap:10px; }
        .bf-ref-center { order:0; }
        .bf-ref-name { font-size:32px; }
        .bf-ref-timer { font-size:64px; margin:16px 0 18px; }
        .bf-ref-main-controls { grid-template-columns: 1fr 72px; }
        .bf-ref-time-controls { grid-template-columns: repeat(2,1fr); }
        .bf-ref-score { font-size:70px; }
        .bf-ref-footer { padding:14px; }
      }

      @media (max-width: 640px) {
        .bf-formats, .bf-methods { grid-template-columns: 1fr; }
        .bf-arrange-grid { grid-template-columns: 1fr; }
      }
