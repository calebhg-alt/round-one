        font-family: 'Inter', sans-serif;
        background: radial-gradient(ellipse at top, #121826 0%, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
        width: 100%;
      }
      .bf-disp { font-family: 'Oswald', sans-serif; letter-spacing: 0.02em; text-transform: uppercase; }
      .bf-mono { font-family: 'JetBrains Mono', monospace; }
      .bf-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
      .bf-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .bf-scrollbar::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 8px; }

      .bf-shell { max-width: 1280px; margin: 0 auto; padding: 28px 20px 80px; }

      .bf-logo { display:flex; align-items:center; gap:10px; }
      .bf-logo-mark { width:38px; height:38px; border-radius:9px; background:linear-gradient(135deg,var(--gold),#c8892b); display:flex; align-items:center; justify-content:center; box-shadow:0 0 24px rgba(244,185,66,0.35); flex-shrink:0; }
      .bf-logo-text { font-size: 22px; font-weight:700; line-height:1.1; }
      .bf-logo-text span { color: var(--gold); }

      .bf-btn { font-family:'Inter',sans-serif; font-weight:600; font-size:14px; border-radius:10px; padding:11px 18px; border:1px solid var(--line2); background:var(--surface); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition: all .15s ease; }
      .bf-btn:hover { background: var(--surface2); border-color: var(--muted2); transform: translateY(-1px); }
      .bf-btn:active { transform: translateY(0); }
      .bf-btn-primary { background: linear-gradient(135deg,#f4b942,#d99a2e); border:none; color:#1a1204; box-shadow: 0 4px 18px rgba(244,185,66,0.28); }
      .bf-btn-primary:hover { filter:brightness(1.07); background: linear-gradient(135deg,#f4b942,#d99a2e); }
      .bf-btn-ghost { background:transparent; border:1px solid var(--line); }
      .bf-btn-danger:hover { border-color: var(--crimson); color:#ffb3ba; }
      .bf-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

      .bf-empty { text-align:center; padding: 90px 20px; border:1.5px dashed var(--line2); border-radius:18px; margin-top: 10px; }
      .bf-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:140px 20px; }
      .bf-loading-mark { width:34px; height:34px; border-radius:50%; border:3px solid var(--line2); border-top-color: var(--gold); animation: bf-spin 0.8s linear infinite; }

      .bf-gate { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
      .bf-gate-card { width:100%; max-width:340px; background: linear-gradient(155deg, var(--surface), var(--bg2)); border:1px solid var(--line); border-radius:18px; padding:32px 28px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
      .bf-gate-card.shake { animation: bf-shake 0.4s ease; }
      @keyframes bf-shake { 10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);} 30%,50%,70%{transform:translateX(-7px);} 40%,60%{transform:translateX(7px);} }
      .bf-gate-input { text-align:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.35em; padding:12px 14px; }
      .bf-gate-input.err { border-color: var(--crimson); }
      .bf-gate-error { color: var(--crimson); font-size:12.5px; text-align:center; margin-top:10px; }
      @keyframes bf-spin { to { transform: rotate(360deg); } }

      .bf-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap:18px; }
      .bf-card { background: linear-gradient(155deg, var(--surface), var(--bg2)); border:1px solid var(--line); border-radius:16px; padding:20px; position:relative; overflow:hidden; cursor:pointer; transition: all .18s ease; }
      .bf-card:hover { border-color: var(--gold-dim); transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.35); }
      .bf-card-glow { position:absolute; top:-40px; right:-40px; width:130px; height:130px; border-radius:50%; background: radial-gradient(circle, rgba(244,185,66,0.16), transparent 70%); }
      .bf-card-title { font-size:19px; font-weight:700; margin-bottom:10px; padding-right: 24px; line-height:1.25; }
      .bf-card-meta { display:flex; align-items:center; gap:14px; color:var(--muted); font-size:13px; margin-bottom: 14px; }
      .bf-card-meta-item { display:flex; align-items:center; gap:5px; }
      .bf-badge { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; padding:5px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:0.05em; }
      .bf-badge-live { background: rgba(51,214,192,0.14); color: var(--teal); border:1px solid rgba(51,214,192,0.3); }
      .bf-badge-done { background: rgba(244,185,66,0.14); color: var(--gold); border:1px solid rgba(244,185,66,0.3); }

      .bf-newcard { border: 1.5px dashed var(--line2); border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:20px; min-height:150px; cursor:pointer; color: var(--muted); transition: all .18s ease; }
      .bf-newcard:hover { border-color: var(--gold-dim); color: var(--gold); background: rgba(244,185,66,0.04); }

      .bf-wizard { max-width: 640px; margin: 0 auto; }
      .bf-steps { display:flex; gap:8px; margin-bottom: 30px; }
      .bf-step-dot { flex:1; height:4px; border-radius:3px; background: var(--line); }
      .bf-step-dot.active { background: var(--gold); }
      .bf-step-dot.done { background: var(--gold-dim); }

      .bf-h1 { font-size: 28px; font-weight:700; margin: 0 0 6px; }
      .bf-sub { color: var(--muted); font-size:14px; margin-bottom: 26px; }

      .bf-input { width:100%; background: var(--surface); border:1.5px solid var(--line); color:var(--text); font-size:15px; padding:13px 15px; border-radius:10px; font-family:'Inter',sans-serif; outline:none; transition: border-color .15s; }
      .bf-input:focus { border-color: var(--gold-dim); }
      .bf-label { font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color: var(--muted); font-weight:700; margin-bottom:8px; display:block; }

      .bf-formats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      .bf-format-opt { border:1.5px solid var(--line); border-radius:12px; padding:16px; cursor:pointer; transition: all .15s; }
      .bf-format-opt:hover { border-color: var(--muted2); }
      .bf-format-opt.sel { border-color: var(--gold); background: rgba(244,185,66,0.06); }
      .bf-format-opt-title { font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
      .bf-format-opt-desc { font-size:12.5px; color: var(--muted); line-height:1.4; }

      .bf-addrow { display:flex; gap:8px; margin-bottom:14px; }
      .bf-suggest-dropdown { position:absolute; top:calc(100% + 4px); left:0; right:52px; background: var(--surface2); border:1.5px solid var(--line2); border-radius:12px; box-shadow: 0 12px 30px rgba(0,0,0,0.4); z-index:20; overflow:hidden; }
      .bf-suggest-row { display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; border-bottom:1px solid var(--line); }
      .bf-suggest-row:last-child { border-bottom:none; }
      .bf-suggest-row:hover { background: rgba(244,185,66,0.08); }
      .bf-suggest-name { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .bf-suggest-nick { color: var(--muted); font-weight:400; }
      .bf-suggest-tag { font-size:10.5px; color: var(--muted2); margin-top:1px; display:flex; align-items:center; gap:4px; }
      .bf-suggest-tag.linked { color: var(--teal); }
      .bf-linked-badge { display:inline-flex; margin-left:6px; color: var(--teal); vertical-align:-2px; }
      .bf-playerlist { display:flex; flex-direction:column; gap:8px; max-height: 360px; overflow-y:auto; margin-bottom: 10px; }
      .bf-player-row { display:flex; align-items:center; gap:10px; background: var(--surface); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
      .bf-player-row.dragging { opacity:0.4; }
      .bf-seed-tag { font-family:'JetBrains Mono',monospace; font-size:11px; color: var(--muted2); width:22px; text-align:center; flex-shrink:0; }
      .bf-player-name { flex:1; font-size:14px; font-weight:500; }
      .bf-remove-btn { background:none; border:none; color: var(--muted2); cursor:pointer; padding:4px; border-radius:6px; display:flex; }
      .bf-remove-btn:hover { color: var(--crimson); }
      .bf-grip { color: var(--muted2); cursor: grab; display:flex; }
      .bf-reorder-btns { display:flex; flex-direction:column; gap:2px; }
      .bf-reorder-btns .bf-remove-btn { padding:1px; }
      .bf-reorder-btns .bf-remove-btn:disabled { opacity:0.25; cursor:default; }
      .bf-reorder-btns .bf-remove-btn:not(:disabled):hover { color: var(--gold); }

      .bf-toggle-row { display:flex; align-items:center; justify-content:space-between; gap:14px; background: var(--surface); border:1.5px solid var(--line); border-radius:12px; padding:13px 15px; margin-top:10px; cursor:pointer; transition: border-color .15s; -webkit-tap-highlight-color: transparent; }
      .bf-toggle-row:hover { border-color: var(--muted2); }
      .bf-toggle-title { font-weight:600; font-size:13.5px; }
      .bf-toggle-desc { font-size:11.5px; color: var(--muted); margin-top:2px; line-height:1.35; }

      .bf-switch.on .bf-switch-knob { left:20px; }

      .bf-rr-summary { display:flex; gap:12px; margin: 18px 0 20px; }

      .bf-rr-summary-num { font-size:26px; font-weight:700; color: var(--gold); font-family:'JetBrains Mono',monospace; }
      .bf-rr-summary-label { font-size:11px; color: var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; }

      .bf-methods { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
      .bf-method-opt { border:1.5px solid var(--line); border-radius:12px; padding:14px 10px; text-align:center; cursor:pointer; transition:all .15s; }
      .bf-method-opt:hover { border-color: var(--muted2); }
      .bf-method-opt.sel { border-color: var(--gold); background: rgba(244,185,66,0.06); }
      .bf-method-opt-title { font-weight:700; font-size:13.5px; margin-top:6px; }
      .bf-method-opt-desc { font-size:11px; color: var(--muted); margin-top:3px; line-height:1.3; }

      .bf-pool { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
      .bf-chip { background: var(--surface); border:1.5px solid var(--line); border-radius:999px; padding:9px 16px; font-size:13.5px; font-weight:600; cursor:pointer; transition: all .12s; }
      .bf-chip:hover { border-color: var(--muted2); }
      .bf-chip.sel { border-color: var(--teal); background: rgba(51,214,192,0.12); color:#aef5ea; }
      .bf-pairs { display:flex; flex-direction:column; gap:8px; }

      .bf-pair-vs { color: var(--muted2); font-size:11px; font-weight:700; }

      .bf-footer-nav { display:flex; justify-content:space-between; margin-top: 26px; }

      .bf-arrange-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px 24px; margin-bottom: 22px; }

      .bf-matchup-label { grid-column: 1 / -1; font-size:11px; color:var(--muted2); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; }

      .bf-bracket-wrap { display:flex; flex-direction:column; gap:34px; }
      .bf-section-label { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; display:flex; align-items:center; gap:8px; margin-bottom:14px; }
      .bf-section-label.gold { color: var(--gold); }
      .bf-section-label.crimson { color: var(--crimson); }
      .bf-section-label.teal { color: var(--teal); }
      .bf-section-label.bronze { color: #c98a4b; }

      .bf-editable-title { cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
      .bf-edit-pencil { color: var(--muted2); opacity:0.7; }
      .bf-editable-title:hover .bf-edit-pencil { color: var(--gold); opacity:1; }
      .bf-rename-row { margin-bottom: 8px; }

      .bf-toast { display:inline-block; background: var(--surface2); border:1px solid var(--teal); color: var(--teal); font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:999px; margin-bottom:14px; }
      .bf-lock-banner { display:flex; align-items:center; gap:9px; background: var(--surface); border:1px solid var(--line2); color: var(--muted); font-size:13px; padding:11px 15px; border-radius:10px; margin-bottom:14px; }
      .bf-favorite-banner { display:flex; align-items:center; gap:9px; background: rgba(244,185,66,0.08); border:1px solid var(--gold-dim); color: var(--text); font-size:13px; padding:11px 15px; border-radius:10px; margin-bottom:20px; }
      .bf-favorite-banner strong { color: var(--gold); }

      .bf-modal-overlay { position:fixed; inset:0; background: rgba(5,7,12,0.72); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; backdrop-filter: blur(2px); }
      .bf-modal { background: var(--surface); border:1px solid var(--line2); border-radius:18px; padding:24px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
      .bf-modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }

      .bf-rr-rounds { display:flex; flex-direction:column; gap:22px; }
      .bf-rr-round-matches { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:14px; }

      /* player profiles */
      .bf-avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-weight:700; color:#12141c; flex-shrink:0; }
      .bf-profile-card { display:flex; flex-direction:column; align-items:center; text-align:center; gap:4px; padding-top:26px; }
      .bf-profile-card .bf-avatar { width:64px; height:64px; font-size:22px; margin-bottom:8px; }
      .bf-profile-nick { color: var(--muted); font-size:12.5px; margin-bottom:8px; }

      .bf-belt-tab.sel { border-color: var(--gold); color: var(--gold); background: rgba(244,185,66,0.08); }

      .bf-belt-opt { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1.5px solid var(--line); border-radius:10px; cursor:pointer; font-size:12.5px; font-weight:600; transition: all .15s; }
      .bf-belt-opt:hover { border-color: var(--muted2); }
      .bf-belt-opt.sel { border-color: var(--gold); background: rgba(244,185,66,0.08); }
      .bf-profile-quickstats { display:flex; gap:16px; margin-top:8px; }
      .bf-profile-quickstat { text-align:center; }
      .bf-profile-quickstat-num { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; color: var(--gold); }
      .bf-profile-quickstat-label { font-size:10px; color: var(--muted2); text-transform:uppercase; letter-spacing:0.05em; }

      .bf-profile-header { display:flex; gap:18px; align-items:center; margin-bottom: 24px; flex-wrap:wrap; }
      .bf-profile-header .bf-avatar { width:76px; height:76px; font-size:26px; }
      .bf-profile-meta-line { color: var(--muted); font-size:13px; margin-top:4px; }
      .bf-profile-bio { color: var(--muted); font-size:13.5px; line-height:1.5; margin: 4px 0 20px; max-width: 640px; }

      .bf-dash-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:12px; margin-bottom: 26px; }
      .bf-dash-tile { background: var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 14px; text-align:center; }
      .bf-dash-num { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:24px; color: var(--gold); }
      .bf-dash-label { font-size:10.5px; color: var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px; }

      .bf-history-row { display:flex; align-items:center; justify-content:space-between; gap:12px; background: var(--surface); border:1px solid var(--line); border-radius:10px; padding:12px 15px; margin-bottom:8px; }
      .bf-history-name { font-weight:600; font-size:14px; }
      .bf-history-meta { font-size:11.5px; color: var(--muted); margin-top:2px; }
      .bf-placement-pill { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; flex-shrink:0; }
      .bf-placement-1 { background: rgba(244,185,66,0.15); color: var(--gold); }
      .bf-placement-2 { background: rgba(201,207,219,0.15); color: #c9cfdb; }
      .bf-placement-3 { background: rgba(201,138,75,0.15); color: #c98a4b; }
      .bf-placement-none { background: var(--surface2); color: var(--muted2); }

      .bf-match-row-item { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); font-size:13px; }
      .bf-match-row-item:last-child { border-bottom:none; }
      .bf-match-row-item .result-w { color: var(--teal); font-weight:700; font-size:11px; }
      .bf-match-row-item .result-l { color: var(--crimson); font-weight:700; font-size:11px; }

      .bf-linked-chip { display:inline-flex; align-items:center; gap:8px; background: var(--surface2); border:1px solid var(--line2); border-radius:999px; padding:7px 8px 7px 12px; font-size:12.5px; margin:4px 6px 4px 0; }
      .bf-link-pool-tournament { margin-bottom: 14px; }
      .bf-link-pool-title { font-size:12px; font-weight:700; color: var(--muted); margin-bottom:6px; }
      .bf-live-dot { width:8px; height:8px; border-radius:50%; background: var(--teal); box-shadow: 0 0 0 0 rgba(51,214,192,0.6); animation: bf-live-ping 1.6s ease-out infinite; }
      @keyframes bf-live-ping { 0% { box-shadow: 0 0 0 0 rgba(51,214,192,0.55); } 70% { box-shadow: 0 0 0 7px rgba(51,214,192,0); } 100% { box-shadow: 0 0 0 0 rgba(51,214,192,0); } }
      .bf-rounds-row { display:flex; gap:60px; overflow-x:auto; padding-bottom:14px; }
      .bf-round-col { display:flex; flex-direction:column; flex-shrink:0; width:212px; }
      .bf-round-title { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; text-align:center; font-weight:700; }

      .bf-match { border-radius:11px; border:1.5px solid var(--line); background: var(--surface); overflow:hidden; position:relative; }

      .bf-match-row:last-child { border-bottom:none; }

      .bf-match-row.loser { color: var(--muted2); text-decoration: line-through; text-decoration-color: rgba(139,147,168,0.5); }
      .bf-match-row.pending { color: var(--muted); font-style: italic; cursor:default; }
      .bf-match-row.bye-row { color: var(--muted2); font-style: italic; cursor:default; }
      .bf-seed-mini { font-family:'JetBrains Mono',monospace; font-size:10px; color: var(--muted2); flex-shrink:0; }

      .bf-gf-section { display:flex; flex-direction:column; align-items:center; gap:16px; margin-top: 8px; padding: 26px; border-radius:16px; background: radial-gradient(ellipse at top, rgba(244,185,66,0.07), transparent 70%); border:1px solid var(--line); }

      .bf-gf-card { width:210px; }

      .bf-champion-banner { margin-top: 30px; text-align:center; padding: 40px 20px; border-radius:20px; background: linear-gradient(160deg, rgba(244,185,66,0.13), rgba(244,185,66,0.02)); border:1.5px solid var(--gold-dim); position:relative; overflow:hidden; }
      .bf-champion-glow { position:absolute; inset:0; background: radial-gradient(circle at 50% 0%, rgba(244,185,66,0.25), transparent 60%); animation: bf-pulse 2.4s ease-in-out infinite; pointer-events:none; }
      @keyframes bf-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

      .bf-champion-label { color: var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:0.08em; position:relative; }

      .bf-hint { font-size:12.5px; color: var(--muted); background: var(--surface); border:1px solid var(--line); border-radius:10px; padding:11px 14px; display:flex; gap:9px; align-items:flex-start; margin-bottom:18px; }

      .bf-match-row-controls { display:flex; align-items:center; gap:5px; flex-shrink:0; }
      .bf-sub-toggle { display:flex; align-items:center; gap:3px; font-size:10px; font-weight:700; letter-spacing:0.02em; padding:3px 6px; border-radius:6px; border:1px solid var(--line2); background: var(--bg2); color: var(--muted2); cursor:pointer; flex-shrink:0; transition: all .12s; }

      .bf-match-time-row { display:flex; align-items:center; gap:6px; padding:6px 10px; border-bottom:1px solid var(--line); background: rgba(255,255,255,0.02); color: var(--muted2); }
      .bf-time-input { flex:1; min-width:0; background:transparent; border:none; color: var(--muted); font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:1px 0; }

      .bf-mat-badge { font-size:9.5px; font-weight:700; background: var(--surface2); border:1px solid var(--line2); color: var(--muted); padding:2px 6px; border-radius:5px; flex-shrink:0; white-space:nowrap; }

      .bf-match-row-main { display:flex; align-items:center; gap:6px; overflow:hidden; }

      .bf-stats-section { margin-top: 26px; }

      .bf-stats-table th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color: var(--muted); font-weight:700; padding:12px 16px; background: var(--surface2); border-bottom:1px solid var(--line); }

      .bf-stats-table tr:last-child td { border-bottom:none; }
      .bf-stats-table th.num, .bf-stats-table td.num { text-align:center; font-family:'JetBrains Mono',monospace; }
      .bf-stats-rank { display:flex; align-items:center; gap:8px; font-weight:600; }

      @media (max-width: 640px) {

      }
